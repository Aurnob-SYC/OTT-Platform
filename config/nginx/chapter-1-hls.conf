# Chapter 1 live HLS and Chapter 3 VOD HLS delivery.
#
# Include this server block from nginx.conf, or copy the locations into the
# server block that listens on your LAN HTTP port. Update the alias path if the
# repository is checked out somewhere other than D:/OTT-Platform.

server {
    listen 80;
    server_name _;

    location /hls/ {
        alias D:/OTT-Platform/backend/media/live/;
        autoindex off;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
        add_header Accept-Ranges bytes always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Max-Age 3600 always;
            add_header Content-Length 0;
            return 204;
        }
    }

    location ~ ^/hls/(.+\.m3u8)$ {
        alias D:/OTT-Platform/backend/media/live/$1;
        autoindex off;

        types {
            application/vnd.apple.mpegurl m3u8;
        }

        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
        add_header Accept-Ranges bytes always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Max-Age 3600 always;
            add_header Content-Length 0;
            return 204;
        }
    }

    location ~ ^/hls/(.+\.ts)$ {
        alias D:/OTT-Platform/backend/media/live/$1;
        autoindex off;

        types {
            video/mp2t ts;
        }

        add_header Cache-Control "public, max-age=10" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
        add_header Accept-Ranges bytes always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Max-Age 3600 always;
            add_header Content-Length 0;
            return 204;
        }
    }

    location /vod/ {
        alias D:/OTT-Platform/backend/media/vod/;
        autoindex off;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
        add_header Accept-Ranges bytes always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Max-Age 3600 always;
            add_header Content-Length 0;
            return 204;
        }
    }

    location ~ ^/vod/(.+\.m3u8)$ {
        alias D:/OTT-Platform/backend/media/vod/$1;
        autoindex off;

        types {
            application/vnd.apple.mpegurl m3u8;
        }

        add_header Cache-Control "public, max-age=60" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
        add_header Accept-Ranges bytes always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Max-Age 3600 always;
            add_header Content-Length 0;
            return 204;
        }
    }

    location ~ ^/vod/(.+\.ts)$ {
        alias D:/OTT-Platform/backend/media/vod/$1;
        autoindex off;

        types {
            video/mp2t ts;
        }

        add_header Cache-Control "public, max-age=86400, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
        add_header Accept-Ranges bytes always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Max-Age 3600 always;
            add_header Content-Length 0;
            return 204;
        }
    }
}
